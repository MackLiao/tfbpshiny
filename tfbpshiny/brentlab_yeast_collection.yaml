repositories:
  # NOTE: BrentLab/callingcards excluded — 3 tfbpapi bugs:
  #   1. annotated_features: _register_meta_view uses literal "sample_id"
  #      instead of mapped field "id" (sample_id: field: id).
  #   2. annotated_features_combined: partitioned parquet discovery fails
  #      ("Config not found") despite config existing on HF.
  #   3. annotated_features_orig_reprocess: same partitioned discovery issue.

  BrentLab/harbison_2004:
    dataset:
      # binding
      harbison_2004:
        db_name: harbison
        sample_id:
          field: sample_id
        carbon_source:
          field: condition
          path: media.carbon_source.compound
        temperature_celsius:
          field: condition
          path: temperature_celsius
          dtype: numeric
        regulator_locus_tag:
          field: regulator_locus_tag
        regulator_symbol:
          field: regulator_symbol

  BrentLab/rossi_2021:
    # binding
    carbon_source:
      path: experimental_conditions.media.carbon_source.compound
    temperature_celsius:
      path: experimental_conditions.temperature_celsius
    dataset:
      rossi_2021_af_combined:
        db_name: rossi
        sample_id:
          field: sample_id
        regulator_locus_tag:
          field: regulator_locus_tag
        target_locus_tag:
          field: target_locus_tag

  # NOTE: BrentLab/mahendrawada_2025 (chec_mahendrawada) excluded — tfbpapi bug:
  #   _register_meta_view tries to SELECT regulator_locus_tag/regulator_symbol
  #   from the primary parquet, but these columns only exist in the separate
  #   metadata table (chec_mahendrawada_m2025_af_combined_meta). tfbpapi needs
  #   to JOIN the _meta parquet to resolve property mappings.

  BrentLab/hughes_2006:
    dataset:
      # perturbation
      overexpression:
        db_name: hughes_overexpression
        sample_id:
          field: sample_id
        carbon_source:
          path: experimental_conditions.media.carbon_source.compound
        temperature_celsius:
          path: experimental_conditions.temperature_celsius
        regulator_locus_tag:
          field: regulator_locus_tag
        regulator_symbol:
          field: regulator_symbol
      # perturbation
      knockout:
        db_name: hughes_knockout
        sample_id:
          field: sample_id
        carbon_source:
          path: experimental_conditions.media.carbon_source.compound
        temperature_celsius:
          path: experimental_conditions.temperature_celsius
        regulator_locus_tag:
          field: regulator_locus_tag
        regulator_symbol:
          field: regulator_symbol

  BrentLab/kemmeren_2014:
    dataset:
      # perturbation
      kemmeren_2014:
        db_name: kemmeren
        sample_id:
          field: sample_id
        carbon_source:
          path: experimental_conditions.media.carbon_source.compound
        temperature_celsius:
          path: experimental_conditions.temperature_celsius
        regulator_locus_tag:
          field: regulator_locus_tag
        regulator_symbol:
          field: regulator_symbol

  BrentLab/hackett_2020:
    dataset:
      # perturbation
      hackett_2020:
        db_name: hackett
        sample_id:
          field: sample_id
        carbon_source:
          path: experimental_conditions.media.carbon_source.compound
        temperature_celsius:
          path: experimental_conditions.temperature_celsius
          dtype: numeric
        regulator_locus_tag:
          field: regulator_locus_tag
        regulator_symbol:
          field: regulator_symbol

  BrentLab/yeast_comparative_analysis:
    dataset:
      dto:
        db_name: dto
        sample_id:
          field: sample_id
        dto_pvalue:
          field: dto_empirical_pvalue
        dto_fdr:
          field: dto_fdr
        links:
          binding_id:
            - [BrentLab/harbison_2004, harbison_2004]
            - [BrentLab/rossi_2021, rossi_2021_af_combined]
            - [BrentLab/mahendrawada_2025, chec_mahendrawada_m2025_af_combined]
          perturbation_id:
            - [BrentLab/kemmeren_2014, kemmeren_2014]
            - [BrentLab/hackett_2020, hackett_2020]
            - [BrentLab/hughes_2006, overexpression]
            - [BrentLab/hughes_2006, knockout]

factor_aliases:
  carbon_source:
    glucose: [D-glucose, dextrose, glu]
    galactose: [D-galactose, gal]
    raffinose: [D-raffinose]

missing_value_labels:
  carbon_source: unspecified

description:
  carbon_source: The carbon source provided during growth
  temperature_celsius: Growth temperature in degrees Celsius
